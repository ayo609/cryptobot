<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - QuantEdge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0B0F1A;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
  overflow: hidden;
}

#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.login-box {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 15px;
  backdrop-filter: blur(15px);
  width: 320px;
  text-align: center;
}

.login-box h2 {
  margin-bottom: 20px;
}

.input-group {
  position: relative;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* TOGGLE ICON */
.toggle-password {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 14px;
  color: #888;
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(45deg,#3B82F6,#22C55E);
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: 600;
  margin-top: 10px;
  cursor: pointer;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 15px rgba(59,130,246,0.5);
}

.link {
  margin-top: 10px;
  font-size: 13px;
  color: #3B82F6;
  cursor: pointer;
}

.error {
  color: #EF4444;
  font-size: 13px;
  margin-top: 10px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="login-box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email">

  <div class="input-group">
    <input type="password" id="password" placeholder="Password">
    <span class="toggle-password" onclick="togglePassword()">👁️</span>
  </div>

  <button onclick="login()">Login</button>

  <div class="link" onclick="resetPassword()">Forgot Password?</div>

  <p class="error" id="error"></p>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3XI2ywFjSR2laS4gmP6ugvMpD_WLYyeg",
  authDomain: "cryptobot-40f05.firebaseapp.com",
  projectId: "cryptobot-40f05",
  storageBucket: "cryptobot-40f05.firebasestorage.app",
  messagingSenderId: "186287498883",
  appId: "1:186287498883:web:de1143bfa58a789d0b5db6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "dashboard.html";
    })
    .catch(error => {
      document.getElementById("error").innerText = error.message;
    });
};

window.resetPassword = function () {
  const email = document.getElementById("email").value;

  if (!email) {
    document.getElementById("error").innerText = "Enter your email first.";
    return;
  }

  sendPasswordResetEmail(auth, email)
    .then(() => {
      document.getElementById("error").style.color = "#22C55E";
      document.getElementById("error").innerText = "Password reset email sent.";
    })
    .catch(error => {
      document.getElementById("error").style.color = "#EF4444";
      document.getElementById("error").innerText = error.message;
    });
};

</script>

<!-- TOGGLE SCRIPT -->
<script>
function togglePassword() {
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}
</script>

<!-- PARTICLES -->
<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "rgba(59,130,246,0.6)";
  
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  update();
}

function update(){
  particles.forEach(p=>{
    p.y += p.d;
    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  });
}

setInterval(draw, 30);
</script>

</body>
</html>
