<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantEdge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0B0F1A;
  color: #fff;
  overflow: hidden;
}

/* PARTICLE CANVAS */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(45deg,#3B82F6,#22C55E);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.login-btn {
  background: rgba(59,130,246,0.2);
  border: 1px solid rgba(59,130,246,0.5);
  padding: 10px 20px;
  border-radius: 10px;
  color: #fff;
  text-decoration: none;
  transition: 0.3s;
}

.login-btn:hover {
  background: #3B82F6;
  transform: scale(1.05);
}

/* HERO */
.hero {
  height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  animation: fadeUp 1.5s ease;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 20px;
  background: linear-gradient(90deg,#3B82F6,#22C55E);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  color: #aaa;
  margin-bottom: 30px;
}

.cta {
  padding: 15px 35px;
  border-radius: 12px;
  background: linear-gradient(45deg,#3B82F6,#22C55E);
  text-decoration: none;
  color: #fff;
  font-weight: 600;
  transition: 0.3s;
}

.cta:hover {
  transform: translateY(-4px);
  box-shadow: 0 0 20px rgba(59,130,246,0.6);
}

/* FEATURES */
.features {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 25px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 20px rgba(59,130,246,0.3);
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media(max-width:768px){
  .hero h1 {
    font-size: 30px;
  }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<header>
  <div class="logo">QuantEdge</div>
  <a href="login.html" class="login-btn">Login</a>
</header>

<section class="hero">
  <h1>Trade Smarter. Not Harder.</h1>
  <p>AI-assisted crypto trading with precision and control.</p>
  <a href="login.html" class="cta">Enter Dashboard</a>
</section>

<section class="features">
  <div class="card">
    <h3>📊 Market Intelligence</h3>
    <p>Track BTC, ETH, SOL in real-time.</p>
  </div>
  <div class="card">
    <h3>🤖 Smart Execution</h3>
    <p>Automated signals with risk control.</p>
  </div>
  <div class="card">
    <h3>🔐 Secure System</h3>
    <p>Safe API connection to your exchange.</p>
  </div>
</section>

<script>
// SIMPLE PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "rgba(59,130,246,0.6)";
  
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  update();
}

function update(){
  particles.forEach(p=>{
    p.y += p.d;
    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  });
}

setInterval(draw, 30);
</script>

</body>
</html>
